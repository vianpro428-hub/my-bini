<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIKKA TAKAHASHI MY BINI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#090909;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,.85);
position:sticky;
top:0;
backdrop-filter:blur(10px);
border-bottom:1px solid #ff0000;
}

.logo{
font-size:28px;
font-weight:900;
color:#ff1a1a;
text-shadow:0 0 15px red;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:.3s;
}

nav a:hover{
color:#ff1a1a;
}

.hero{
min-height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
background:
linear-gradient(rgba(0,0,0,.7),
rgba(0,0,0,.9)),
url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1500&q=80');
background-size:cover;
background-position:center;
}

.hero h1{
font-size:65px;
color:#ff1a1a;
text-shadow:0 0 25px red;
}

.hero p{
margin-top:15px;
font-size:20px;
max-width:700px;
color:#aaa;
}

.btn{
margin-top:30px;
padding:15px 35px;
background:#ff1a1a;
color:white;
text-decoration:none;
border-radius:12px;
font-weight:bold;
box-shadow:0 0 20px red;
}

.section{
padding:80px 8%;
}

.section-title{
font-size:35px;
margin-bottom:30px;
color:#ff1a1a;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#141414;
padding:25px;
border-radius:15px;
border:1px solid #222;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#ff1a1a;
box-shadow:0 0 20px rgba(255,0,0,.4);
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.stat{
background:#141414;
padding:30px;
border-radius:15px;
text-align:center;
}

.stat h2{
color:#ff1a1a;
font-size:35px;
}

.socials{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:20px;
}

.socials a{
text-decoration:none;
background:#ff1a1a;
color:white;
padding:12px 20px;
border-radius:10px;
}

footer{
padding:30px;
text-align:center;
border-top:1px solid #222;
margin-top:50px;
color:#999;
}

</style>
</head>
<body>

<header>
<div class="logo">GOON FAMILY</div>

<nav>
<a href="#">Beranda</a>
<a href="#">Anime</a>
<a href="#">Gaming</a>
<a href="#">Teknologi</a>
<a href="#">Komunitas</a>
</nav>
</header>

<h1>RIKKA TAKAHASHI BINI VIAN</h1>
<section class="hero">

<h1>RIKKA TAKAHASHI BINI VIAN</h1>
