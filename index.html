<title>RIKKA TAKAHASHI MY BINI</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#55555;
color:blue;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:rgba(0,0,0,.85);
position:sticky;
top:0;
backdrop-filter:blur(10px);
border-bottom:1px solid #ff0000;
}

.logo{
font-size:29px;
font-weight:900;
color:#ff1a1a;
text-shadow:0 0 15px red;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
transition:.3s;
}

nav a:hover{
color:#ff1a1a;
}
