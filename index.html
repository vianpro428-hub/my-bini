<!DOCTYPE html>
<html>
<head>
<style>

body{
  background:black;
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.carousel{
  display:flex;
  align-items:center;
  gap:20px;
}

.card{
  width:180px;
  border-radius:20px;
  cursor:pointer;
  transition:0.5s;
}

.kiri{
  transform:perspective(1000px) rotateY(40deg);
  opacity:0.7;
}

.tengah{
  width:250px;
  transform:scale(1.1);
}

.kanan{
  transform:perspective(1000px) rotateY(-40deg);
  opacity:0.7;
}

</style>
</head>

<body>

<div class="carousel">

  <img src="Rikka.jpg" class="card kiri">

  <img src="Roxy.jpg" class="card tengah">

  <img src="Megu.jpg" class="card kanan">

</div>

<script>

const cards = document.querySelectorAll(".card");

cards.forEach(card => {

  card.addEventListener("click", () => {

    cards.forEach(c=>{
      c.classList.remove("kiri","tengah","kanan");
    });

    if(card === cards[0]){
      cards[0].classList.add("tengah");
      cards[1].classList.add("kanan");
      cards[2].classList.add("kiri");
    }

    if(card === cards[1]){
      cards[0].classList.add("kiri");
      cards[1].classList.add("tengah");
      cards[2].classList.add("kanan");
    }

    if(card === cards[2]){
      cards[0].classList.add("kanan");
      cards[1].classList.add("kiri");
      cards[2].classList.add("tengah");
    }

  });

});

</script>

</body>
</html>
